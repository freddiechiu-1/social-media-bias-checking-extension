<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>ClaimCheck</title>
  </head>
  <body>
    <header>
      <button id="popout" type="button" title="Open in a separate window" aria-label="Open in a separate window">⤢</button>
      <h1>ClaimCheck</h1>
      <p class="tagline">A footnote on what you're reading.</p>
    </header>

    <div id="mode-control" class="mode-control" role="radiogroup" aria-label="Analysis mode">
      <button type="button" class="mode-pill" data-mode="quick" role="radio" aria-checked="false" title="~5–10s. At-a-glance read. Web search optional below.">Quick</button>
      <button type="button" class="mode-pill is-selected" data-mode="standard" role="radio" aria-checked="true" title="~30–60s. Full analysis with web search and cited evidence. Recommended default.">Standard</button>
      <button type="button" class="mode-pill" data-mode="deep" role="radio" aria-checked="false" title="~30–90s. Full analysis with web search. Sources cited inline.">Deep</button>
    </div>

    <form id="form">
      <textarea id="input" placeholder="Paste the tweet text (URLs may not load — X requires auth)" rows="4"></textarea>
      <button id="submit" type="submit">Analyze</button>
    </form>

    <div id="url-hint" class="status hidden"></div>
    <div id="inflight-banner" class="status hidden">
      <span id="inflight-text"></span>
      <button id="inflight-cancel" type="button" title="Stop watching this analysis">Cancel</button>
    </div>
    <div id="status" class="status hidden" aria-live="polite"></div>

    <main id="result" class="hidden">
      <section class="card" data-key="tldr">
        <h2>TL;DR</h2>
        <div class="content"></div>
      </section>
      <section class="card" data-key="claims">
        <h2>What it's claiming</h2>
        <div class="content"></div>
      </section>
      <section class="card" data-key="evidence">
        <h2>What we found</h2>
        <div class="content"></div>
      </section>
      <section class="card" data-key="steelman">
        <h2>Strongest disagreement</h2>
        <div class="content"></div>
      </section>
      <section class="card" data-key="couldnt_verify">
        <h2>What we couldn't verify</h2>
        <div class="content"></div>
      </section>
      <section class="card" data-key="how_to_verify">
        <h2>How you'd verify yourself</h2>
        <div class="content"></div>
      </section>
    </main>

    <div id="search-override-cta" class="hidden">
      <button type="button" id="search-override-btn">🔍 Add full analysis: evidence + steelman (~20s)</button>
      <p class="search-override-hint">Fast mode skips web search, evidence synthesis, and steelman. Click to add cited evidence and steelman analysis (~20s).</p>
    </div>

    <script src="render.js" type="module"></script>
    <script src="popup.js" type="module"></script>
  </body>
</html>
